name: clippy

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Warm Cargo metadata
        run: cargo metadata --format-version 1 > /dev/null
      - name: Clippy
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_TERM_COLOR: always
          CLIPPY_DRIVER_PATH: ${{ runner.temp }}/clippy-driver
        run: |
          set -euxo pipefail
          cp "$(rustup which clippy-driver)" "$CLIPPY_DRIVER_PATH"
          cargo clippy --workspace --all-targets --all-features --message-format short -- -D warnings
