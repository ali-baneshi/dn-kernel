name: clippy

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Warm Cargo metadata
        run: cargo metadata --format-version 1 > /dev/null
      - name: Clippy
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_TERM_COLOR: always
        run: |
          set -euxo pipefail
          cargo clippy --workspace --all-targets --all-features --message-format short -- -D warnings 2>&1 | tee clippy.log
      - name: Upload clippy log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
