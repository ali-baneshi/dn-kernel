name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross toolchain
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
              ;;
            x86_64-unknown-linux-gnu)
              sudo apt-get install -y musl-tools
              ;;
          esac
      - name: Configure linker
        run: |
          mkdir -p .cargo
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
              ;;
            x86_64-unknown-linux-gnu)
              true
              ;;
          esac
      - name: Build binary
        run: cargo build --release -p dn-cli --target ${{ matrix.target }}
      - name: Build C worker
        run: make -C workers/c
      - name: Package archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dn-cli dist/dn-cli
          cp workers/c/dn-worker-c dist/dn-worker-c
          tar -czf dn-kernel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist dn-cli dn-worker-c
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: dn-kernel-${{ matrix.target }}
          path: dn-kernel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dn-kernel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
