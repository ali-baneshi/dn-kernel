name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build binary
        run: cargo build --release -p dn-cli --target ${{ matrix.target }}
      - name: Package archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dn-cli dist/dn-cli
          tar -czf dn-kernel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist dn-cli
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: dn-kernel-${{ matrix.target }}
          path: dn-kernel-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
