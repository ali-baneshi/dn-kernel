name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check --workspace
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        env:
          CARGO_INCREMENTAL: "0"
        run: |
          set -euxo pipefail
          cargo clippy --workspace --all-targets --all-features --message-format short -- -D warnings 2>&1 | tee clippy.log
      - name: Upload clippy log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
      - name: Fmt
        run: cargo fmt --all --check
