name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check --workspace
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Fmt
        run: cargo fmt --all --check
